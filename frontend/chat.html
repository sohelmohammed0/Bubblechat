<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Chat</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <header class="sidebar-header">
        <h2>Bubble Chat</h2>
        <button id="logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
      </header>
      <div class="search-container">
        <input id="search-input" type="text" placeholder="Search users or groups">
        <i class="fas fa-search search-icon"></i>
      </div>
      <ul class="chat-list" id="user-list"></ul>
    </aside>

    <!-- Chat Section -->
    <section class="chat-section">
      <header class="chat-header">
        <div class="chat-info">
          <span id="current-chat-name">Your Username</span>
          <small id="current-chat-status">Online</small>
        </div>
        <button id="theme-btn" class="theme-btn"><i class="fas fa-moon"></i></button>
      </header>

      <div class="chat-box" id="chat-box"></div>

      <!-- Chat Footer -->
      <div class="chat-footer">
        <label for="media" class="media-btn"><i class="fas fa-paperclip"></i></label>
        <input type="file" id="media" class="hidden">
        <input type="text" id="message" placeholder="Type a message...">
        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </section>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const socket = io('http://localhost:5000');
      const user = JSON.parse(sessionStorage.getItem('user'));

      if (!user) {
        alert('You must be logged in to access the chat.');
        window.location.href = 'login.html';
        return;
      }

      const logoutBtn = document.getElementById('logout-btn');
      const themeBtn = document.getElementById('theme-btn');
      const messageInput = document.getElementById('message');
      const chatBox = document.getElementById('chat-box');
      const userList = document.getElementById('user-list');
      const searchInput = document.getElementById('search-input');
      const currentChatName = document.getElementById('current-chat-name');
      const currentChatStatus = document.getElementById('current-chat-status');

      let currentRoom = 'global';

      currentChatName.textContent = user.username;
      currentChatStatus.textContent = 'Online';

      socket.emit('userConnected', user.username);

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.trim();
        if (query) {
          socket.emit('searchUsers', query);
        } else {
          userList.innerHTML = '';
        }
      });

      socket.on('searchResults', (results) => {
        userList.innerHTML = '';
        results.forEach(({ username, status }) => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${username}</span>`;
          li.className = status === 'online' ? 'online' : 'offline';
          li.addEventListener('click', () => {
            currentRoom = `${user.username}-${username}`;
            currentChatName.textContent = username;
            socket.emit('joinRoom', currentRoom);
          });
          userList.appendChild(li);
        });
      });

      document.getElementById('send-btn').addEventListener('click', () => {
        const message = messageInput.value.trim();
        if (message) {
          socket.emit('sendMessage', {
            room: currentRoom,
            message,
            sender: user.username,
          });
          messageInput.value = '';
        }
      });

      socket.on('receiveMessage', (data) => {
        const messageElem = document.createElement('div');
        messageElem.className = data.sender === user.username ? 'chat-bubble user' : 'chat-bubble other';
        messageElem.innerHTML = `<p>${data.sender}: ${data.message}</p>`;
        chatBox.appendChild(messageElem);
        chatBox.scrollTop = chatBox.scrollHeight;
      });

      logoutBtn.addEventListener('click', () => {
        sessionStorage.removeItem('user');
        socket.emit('userDisconnected', user.username);
        window.location.href = 'login.html';
      });

      const themes = ['#ff9a9e', '#6a11cb', '#1c1c1c', '#2bc0e4', '#a8e063'];
      let themeIndex = 0;
      themeBtn.addEventListener('click', () => {
        themeIndex = (themeIndex + 1) % themes.length;
        document.body.style.background = themes[themeIndex];
      });
    });

    // Fetch and display last seen
socket.emit('getLastSeen', chatWith);

socket.on('lastSeen', ({ username, lastSeen }) => {
  if (username === chatWith) {
    currentChatStatus.textContent = lastSeen;
  }
});


li.querySelector('.start-chat-btn').addEventListener('click', () => {
  chatWith = username;
  currentChatName.textContent = username;
  currentRoom = `${user.username}-${username}`;
  socket.emit('joinRoom', { room: currentRoom, username });
  socket.emit('getLastSeen', username);
});


socket.on('receiveMessage', (data) => {
  if (data.room === currentRoom) {
    const messageElem = document.createElement('div');
    messageElem.className = data.sender === user.username ? 'chat-bubble user' : 'chat-bubble other';
    messageElem.innerHTML = `
      <p><strong>${data.sender}:</strong> ${data.message}</p>
      <small>${new Date(data.timestamp).toLocaleString()}</small>
    `;
    chatBox.appendChild(messageElem);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
});

  </script>
</body>
</html>
