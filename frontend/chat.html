<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Chat</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
  <header class="chat-header">
    <h1>Bubble Chat</h1>
    <button id="theme-btn">Change Theme</button>
    <button id="font-btn">Change Font</button>
    <button id="logout-btn">Logout</button>
  </header>

  <main class="chat-container">
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form" class="chat-form">
      <input type="text" id="message" placeholder="Type a message..." required>
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    // User session check
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) {
      alert('You must be logged in to access the chat.');
      window.location.href = 'login.html';
    }

    const socket = io('http://localhost:5000');

    // Sending a message
    document.getElementById('chat-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const message = document.getElementById('message').value;
      socket.emit('sendMessage', { user: user.username, message });
      document.getElementById('message').value = '';
    });

    // Receiving messages
    socket.on('receiveMessage', (data) => {
      const chatBox = document.getElementById('chat-box');
      const messageElement = document.createElement('div');
      messageElement.classList.add('chat-bubble');
      messageElement.textContent = `${data.user}: ${data.message}`;
      chatBox.appendChild(messageElement);
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Logout functionality
    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('user');
      window.location.href = 'login.html';
    });

    // Theme selection
    const themes = ['theme-light', 'theme-dark', 'theme-gradient'];
    let currentTheme = 0;
    document.getElementById('theme-btn').addEventListener('click', () => {
      document.body.classList.remove(themes[currentTheme]);
      currentTheme = (currentTheme + 1) % themes.length;
      document.body.classList.add(themes[currentTheme]);
    });

    // Font selection
    const fonts = ['font-poppins', 'font-roboto', 'font-mono'];
    let currentFont = 0;
    document.getElementById('font-btn').addEventListener('click', () => {
      document.body.classList.remove(fonts[currentFont]);
      currentFont = (currentFont + 1) % fonts.length;
      document.body.classList.add(fonts[currentFont]);
    });
  </script>
</body>
</html>
